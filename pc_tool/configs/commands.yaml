control_values:
  RAM: 0
  FLASH: 1
  EEPROM: 2

  # Breakpoint control values
  DISABLED: 0
  ENABLED: 1
  RESET: 2
  NEXT: 3

commands:
  READ_MEM:
    id: 0x01
    description: "Read n bytes from memory (RAM, FLASH, EEPROM, etc.)"
    params:
      - { name: "control_value", type: "str" }   # 0=RAM, 1=FLASH, 2=EEPROM
      - { name: "address", type: "uint32" }
      - { name: "len", type: "uint32" }

  WRITE_MEM:
    id: 0x02
    description: "Write n bytes to memory (RAM, FLASH, EEPROM, etc.)"
    params:
      - { name: "control_value", type: "str" }   # 0=RAM, 1=FLASH, 2=EEPROM
      - { name: "address", type: "uint32" }
      - { name: "len", type: "uint32" }
      - { name: "data", type: "bytes" }

  READ_REG:
    id: 0x03
    description: "Read MCU register at given address"
    params:
      - { name: "address", type: "uint32_or_str" }

  WRITE_REG:
    id: 0x04
    description: "Write value to MCU register at given address"
    params:
      - { name: "address", type: "uint32_or_str" }
      - { name: "data", type: "bytes" }

  PING:
    id: 0x05
    description: "Check communication link (MCU should respond with ACK)"

  RESET:
    id: 0x06
    description: "Reset the device"

  EXIT:
    id: 0x07
    description: "Exit the program (PC-side only)"

  HELP:
    id: 0x08
    description: "Show this help message (PC-side only)"

  CLEAR:
    id: 0x09
    description: "Clear the console screen (PC-side only)"
  
  BREAKPOINT:
    id: 0x0A
    description: "Trigger a software breakpoint in the MCU firmware"
    params:
      - { name: "address", type: "uint32" }   # Breakpoint ID (0 to MDT_MAX_BREAKPOINTS-1)
      - { name: "control_value", type: "str"}   # 0=disabled, 1=enabled. 2=reset, 3=next, etc
  
  WATCHPOINT:
    id: 0x0B
    description: "Set or clear a memory watchpoint. Fires an event when the 4-byte value at address changes."
    params:
      - { name: "address", type: "uint32" }        # Watchpoint slot ID (0 to MDT_MAX_WATCHPOINTS-1)
      - { name: "control_value", type: "str" }     # enable / disable / reset
      - { name: "watch_address", type: "uint32" }  # Address to watch (ignored for disable/reset)
